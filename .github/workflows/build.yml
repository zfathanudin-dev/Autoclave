            </LinearLayout>
            <TextView android:id="@+id/tvItemOffset" android:layout_width="wrap_content"
                android:layout_height="wrap_content" android:text="Click ABOVE text 40px"
                android:textColor="#00C853" android:textSize="12sp" android:paddingTop="8dp"/>
            <SeekBar android:id="@+id/seekItemOffset" android:layout_width="match_parent"
                android:layout_height="wrap_content" android:max="400" android:progress="160"/>
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                android:orientation="horizontal" android:paddingTop="2dp">
                <TextView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1"
                    android:text="Above" android:textColor="#666666" android:textSize="9sp"/>
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                    android:text="Text" android:textColor="#888888" android:textSize="9sp"/>
                <TextView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1"
                    android:text="Below" android:textColor="#666666" android:textSize="9sp" android:gravity="end"/>
            </LinearLayout>
          </LinearLayout>'''

          for path, content in files.items():
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)
              print("Created: " + path)
          PYEOF

      - name: Download Gradle wrapper
        run: |
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -O gradlew
          chmod +x gradlew
          wget -q "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
               -O gradle/wrapper/gradle-wrapper.jar

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GrowtopiaAutoClicker-v7-FixCrash
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
