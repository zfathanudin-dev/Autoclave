name: Build APK Growtopia AutoClicker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
    
      - name: Buat folder struktur
        run: |
          mkdir -p app/src/main/java/com/wordclicker
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

      - name: settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "GrowtopiaClicker"
          include ':app'
          EOF

      - name: build.gradle root
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.1' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

      - name: gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          EOF

      - name: gradle-wrapper.properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.wordclicker'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.wordclicker"
                  minSdk 24
                  targetSdk 34
                  versionCode 7
                  versionName "7.0-FixCrash"
              }
              
              buildTypes {
                  release { 
                      minifyEnabled false
                      shrinkResources false
                  }
                  debug {
                      debuggable true
                      minifyEnabled false
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              
              kotlinOptions { 
                  jvmTarget = '17' 
              }
          }
          
          dependencies {
              implementation 'androidx.core:core-ktx:1.10.1'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.1'
          }
          EOF

      - name: AndroidManifest.xml - FIXED EXPORTED
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.wordclicker">

              <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE"
                  tools:ignore="ProtectedPermissions"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>

              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.DayNight.NoActionBar"
                  android:enabled="true">

                  <activity 
                      android:name=".MainActivity" 
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <!-- FIX: AccessibilityService HARUS exported=true karena di-bind system -->
                  <service
                      android:name="com.wordclicker.ClickerAccessibilityService"
                      android:enabled="true"
                      android:exported="true"
                      android:label="@string/accessibility_service_label"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService"/>
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_service_config"/>
                  </service>

                  <service
                      android:name="com.wordclicker.ScreenCaptureService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="mediaProjection"/>

              </application>
          </manifest>
          EOF

      - name: strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Growtopia AutoClicker</string>
              <string name="accessibility_service_label">Growtopia AutoClicker</string>
              <string name="accessibility_service_description">Auto click untuk Growtopia dengan deteksi teks item</string>
          </resources>
          EOF

      - name: accessibility_service_config.xml
        run: |
          cat > app/src/main/res/xml/accessibility_service_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeAllMask"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagDefault|flagIncludeNotImportantViews|flagReportViewIds"
              android:canPerformGestures="true"
              android:canRetrieveWindowContent="true"
              android:notificationTimeout="100"
              android:description="@string/accessibility_service_description"/>
          EOF

      - name: drawables
        run: |
          cat > app/src/main/res/drawable/circle_indicator.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#FF4444"/>
              <size android:width="12dp" android:height="12dp"/>
          </shape>
          EOF
          
          cat > app/src/main/res/drawable/badge_priority.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#00C853"/>
              <size android:width="32dp" android:height="32dp"/>
          </shape>
          EOF

      - name: Generate Kotlin & XML files
        run: |
          python3 << 'PYEOF'
          import os

          files = {}

          # === ItemConfig.kt ===
          files["app/src/main/java/com/wordclicker/ItemConfig.kt"] = '''
          package com.wordclicker

          data class ItemConfig(
              val itemName: String,
              val enabled: Boolean = true,
              val offsetY: Int = -60,
              val priority: Int = 0,
              val randomDelay: Boolean = true
          ) {
              fun getClickPosition(textCenterY: Float): Float {
                  return textCenterY + offsetY
              }
          }

          enum class ClickMode { PRIORITY, CLICK_ALL }
          '''

          # === ClickerAccessibilityService.kt - SIMPLIFIED ===
          files["app/src/main/java/com/wordclicker/ClickerAccessibilityService.kt"] = '''
          package com.wordclicker

          import android.accessibilityservice.AccessibilityService
          import android.accessibilityservice.GestureDescription
          import android.graphics.Path
          import android.os.Build
          import android.view.accessibility.AccessibilityEvent
          import kotlin.random.Random

          class ClickerAccessibilityService : AccessibilityService() {

              companion object {
                  var instance: ClickerAccessibilityService? = null
                  var lastClickTime = 0L
                  const val MIN_CLICK_INTERVAL = 150

                  fun performClick(x: Float, y: Float, randomDelay: Boolean = true, onDone: (() -> Unit)? = null) {
                      val svc = instance ?: return
                      if (Build.VERSION.SDK_INT < Build.VERSION_CODES.N) return
                      
                      val now = System.currentTimeMillis()
                      val timeSinceLast = now - lastClickTime
                      
                      val extraDelay = if (randomDelay) Random.nextLong(50, 200) else 0
                      val totalDelay = if (timeSinceLast < MIN_CLICK_INTERVAL) {
                          MIN_CLICK_INTERVAL - timeSinceLast + extraDelay
                      } else extraDelay
                      
                      android.os.Handler(android.os.Looper.getMainLooper()).postDelayed({
                          try {
                              val path = Path().apply { moveTo(x, y) }
                              val stroke = GestureDescription.StrokeDescription(path, 0, Random.nextLong(40, 80))
                              val gesture = GestureDescription.Builder().addStroke(stroke).build()
                              
                              svc.dispatchGesture(gesture, object : GestureResultCallback() {
                                  override fun onCompleted(g: GestureDescription) { 
                                      lastClickTime = System.currentTimeMillis()
                                      onDone?.invoke() 
                                  }
                                  override fun onCancelled(g: GestureDescription) {}
                              }, null)
                          } catch (e: Exception) {}
                      }, totalDelay)
                  }

                  fun isAvailable() = instance != null
              }

              override fun onServiceConnected() {
                  super.onServiceConnected()
                  instance = this
                  android.util.Log.d("GrowtopiaClicker", "Accessibility Service Connected")
              }

              override fun onDestroy() {
                  instance = null
                  super.onDestroy()
              }

              override fun onAccessibilityEvent(event: AccessibilityEvent?) {}
              override fun onInterrupt() {}
          }
          '''

          # === ScreenCaptureService.kt ===
          files["app/src/main/java/com/wordclicker/ScreenCaptureService.kt"] = '''
          package com.wordclicker

          import android.app.*
          import android.content.*
          import android.graphics.*
          import android.hardware.display.DisplayManager
          import android.hardware.display.VirtualDisplay
          import android.media.ImageReader
          import android.media.projection.MediaProjection
          import android.media.projection.MediaProjectionManager
          import android.os.*
          import android.util.DisplayMetrics
          import android.view.WindowManager
          import androidx.core.app.NotificationCompat
          import android.text.TextUtils
          import org.json.JSONArray
          import org.json.JSONObject
          import java.text.SimpleDateFormat
          import java.util.*
          import kotlin.random.Random

          class ScreenCaptureService : Service() {

              companion object {
                  var instance: ScreenCaptureService? = null
                  var logCallback: ((String) -> Unit)? = null
                  var isRunning = false

                  fun log(msg: String) {
                      val time = SimpleDateFormat("HH:mm:ss", Locale.getDefault()).format(Date())
                      val logMsg = "[" + time + "] " + msg
                      logCallback?.invoke(logMsg)
                      android.util.Log.d("GrowtopiaClicker", msg)
                  }

                  const val ACTION_START = "START"
                  const val ACTION_STOP = "STOP"
                  const val EXTRA_RESULT_CODE = "RESULT_CODE"
                  const val EXTRA_RESULT_DATA = "RESULT_DATA"
                  const val CHANNEL_ID = "GrowtopiaClickerChannel"
              }

              private var mediaProjection: MediaProjection? = null
              private var virtualDisplay: VirtualDisplay? = null
              private var imageReader: ImageReader? = null
              private val handler = Handler(Looper.getMainLooper())
              private var screenWidth = 1080
              private var screenHeight = 1920
              private var screenDensity = 1

              private var isScanning = false
              private var itemList = mutableListOf<ItemConfig>()
              private var clickMode = ClickMode.PRIORITY
              private var scanIntervalMs = 1200L
              private var antiBanMode = true

              private val configReceiver = object : BroadcastReceiver() {
                  override fun onReceive(ctx: Context?, intent: Intent?) {
                      loadConfig()
                      log("Config updated")
                  }
              }

              override fun onCreate() {
                  super.onCreate()
                  instance = this
                  createNotificationChannel()
                  loadConfig()
                  
                  val filter = IntentFilter("com.wordclicker.UPDATE_CONFIG")
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(configReceiver, filter, RECEIVER_NOT_EXPORTED)
                  } else {
                      registerReceiver(configReceiver, filter)
                  }
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  when (intent?.action) {
                      ACTION_START -> {
                          val resultCode = intent.getIntExtra(EXTRA_RESULT_CODE, -1)
                          val resultData = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                              intent.getParcelableExtra(EXTRA_RESULT_DATA, Intent::class.java)
                          else @Suppress("DEPRECATION") intent.getParcelableExtra(EXTRA_RESULT_DATA)
                          if (resultData != null) startCapture(resultCode, resultData)
                      }
                      ACTION_STOP -> stopCapture()
                  }
                  return START_STICKY
              }

              private fun startCapture(resultCode: Int, resultData: Intent) {
                  startForeground(1, buildNotification())

                  val wm = getSystemService(WINDOW_SERVICE) as WindowManager
                  val metrics = DisplayMetrics()
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      val bounds = wm.currentWindowMetrics.bounds
                      screenWidth = bounds.width()
                      screenHeight = bounds.height()
                      screenDensity = resources.displayMetrics.densityDpi
                  } else {
                      @Suppress("DEPRECATION") wm.defaultDisplay.getMetrics(metrics)
                      screenWidth = metrics.widthPixels
                      screenHeight = metrics.heightPixels
                      screenDensity = metrics.densityDpi
                  }

                  val mpm = getSystemService(MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                  mediaProjection = mpm.getMediaProjection(resultCode, resultData)

                  imageReader = ImageReader.newInstance(screenWidth, screenHeight, PixelFormat.RGBA_8888, 2)
                  virtualDisplay = mediaProjection?.createVirtualDisplay(
                      "GrowtopiaCapture",
                      screenWidth, screenHeight, screenDensity,
                      DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR,
                      imageReader?.surface, null, null
                  )

                  isRunning = true
                  isScanning = false
                  log("Scan started (" + screenWidth + "x" + screenHeight + ")")
                  scheduleNextScan()
              }

              private fun stopCapture() {
                  isRunning = false
                  handler.removeCallbacksAndMessages(null)
                  virtualDisplay?.release()
                  imageReader?.close()
                  mediaProjection?.stop()
                  virtualDisplay = null
                  imageReader = null
                  mediaProjection = null
                  stopForeground(STOP_FOREGROUND_REMOVE)
                  stopSelf()
                  log("Scan stopped")
              }

              private fun scheduleNextScan() {
                  if (!isRunning) return
                  val delay = if (antiBanMode) scanIntervalMs + Random.nextLong(-200, 300) else scanIntervalMs
                  handler.postDelayed({
                      if (isRunning && !isScanning) doScan()
                      else scheduleNextScan()
                  }, delay.coerceAtLeast(400))
              }

              private fun doScan() {
                  val reader = imageReader ?: run { scheduleNextScan(); return }
                  val image = reader.acquireLatestImage() ?: run { scheduleNextScan(); return }

                  isScanning = true
                  try {
                      val planes = image.planes[0]
                      val buffer = planes.buffer
                      val pixelStride = planes.pixelStride
                      val rowStride = planes.rowStride
                      val rowPadding = rowStride - pixelStride * screenWidth
                      val bitmap = Bitmap.createBitmap(
                          screenWidth + rowPadding / pixelStride,
                          screenHeight, Bitmap.Config.ARGB_8888
                      )
                      bitmap.copyPixelsFromBuffer(buffer)
                      image.close()

                      val cropped = Bitmap.createBitmap(bitmap, 0, 0, screenWidth, screenHeight)
                      bitmap.recycle()

                      val inputImage = InputImage.fromBitmap(cropped, 0)
                      val enabled = itemList.filter { it.enabled }

                      if (enabled.isEmpty()) {
                          cropped.recycle(); isScanning = false; scheduleNextScan(); return
                      }

                      recognizer.process(inputImage)
                          .addOnSuccessListener { result ->
                              try {
                                  processOcrResult(result, enabled)
                              } finally {
                                  cropped.recycle()
                                  isScanning = false
                                  scheduleNextScan()
                              }
                          }
                          .addOnFailureListener { e ->
                              log("OCR error: " + e.message)
                              cropped.recycle()
                              isScanning = false
                              scheduleNextScan()
                          }
                  } catch (e: Exception) {
                      try { image.close() } catch (_: Exception) {}
                      log("Capture error: " + e.message)
                      isScanning = false
                      scheduleNextScan()
                  }
              }

              private fun processOcrResult(result: com.google.mlkit.vision.text.Text, targets: List<ItemConfig>) {
                  data class Found(val config: ItemConfig, val cx: Float, val cy: Float, val textY: Float, val priority: Int)
                  val found = mutableListOf<Found>()

                  for (block in result.textBlocks) {
                      for (line in block.lines) {
                          val detectedText = line.text.trim()
                          
                          for ((priority, cfg) in targets.withIndex()) {
                              if (detectedText.contains(cfg.itemName, ignoreCase = true)) {
                                  val box = line.boundingBox ?: continue
                                  val cx = box.centerX().toFloat()
                                  val textCenterY = box.centerY().toFloat()
                                  val clickY = cfg.getClickPosition(textCenterY)
                                  
                                  if (clickY > 50 && clickY < screenHeight - 50 && cx > 50 && cx < screenWidth - 50) {
                                      found.add(Found(cfg, cx, clickY, textCenterY, priority))
                                      
                                      val posDesc = when {
                                          cfg.offsetY < 0 -> "ABOVE"
                                          cfg.offsetY > 0 -> "BELOW"
                                          else -> "ON"
                                      }
                                      log(cfg.itemName + " " + posDesc + " (" + cx.toInt() + "," + clickY.toInt() + ") [" + detectedText + "]")
                                  }
                              }
                          }
                      }
                  }

                  if (found.isEmpty()) return

                  if (!ClickerAccessibilityService.isAvailable()) {
                      log("WARNING: Accessibility not available!")
                      return
                  }

                  when (clickMode) {
                      ClickMode.PRIORITY -> {
                          val best = found.minByOrNull { it.priority } ?: return
                          val posDesc = when {
                              best.config.offsetY < 0 -> "above"
                              best.config.offsetY > 0 -> "below"
                              else -> "on"
                          }
                          log("Click " + best.config.itemName + " " + posDesc)
                          ClickerAccessibilityService.performClick(best.cx, best.cy, best.config.randomDelay) {
                              log("Click success")
                          }
                      }
                      ClickMode.CLICK_ALL -> {
                          val sorted = found.sortedBy { it.priority }.distinctBy { "" + it.cx.toInt() + "," + it.cy.toInt() }
                          for (f in sorted.take(4)) {
                              val posDesc = when {
                                  f.config.offsetY < 0 -> "above"
                                  f.config.offsetY > 0 -> "below"
                                  else -> "on"
                              }
                              log("Click " + f.config.itemName + " " + posDesc)
                              ClickerAccessibilityService.performClick(f.cx, f.cy, f.config.randomDelay)
                              Thread.sleep(Random.nextLong(250, 500))
                          }
                      }
                  }
              }

              private fun loadConfig() {
                  val prefs = getSharedPreferences("GrowtopiaClickerPrefs", Context.MODE_PRIVATE)
                  clickMode = if (prefs.getString("click_mode", "PRIORITY") == "PRIORITY") ClickMode.PRIORITY else ClickMode.CLICK_ALL
                  scanIntervalMs = prefs.getInt("scan_interval_ms", 1200).toLong()
                  antiBanMode = prefs.getBoolean("anti_ban_mode", true)
                  itemList.clear()
                  
                  val jsonStr = prefs.getString("item_list", "")
                  if (jsonStr.isNullOrEmpty()) {
                      itemList.add(ItemConfig("Clamp", true, -40, 0))
                      itemList.add(ItemConfig("Transfusion", true, -40, 1))
                      itemList.add(ItemConfig("Scalpel", true, -40, 2))
                      itemList.add(ItemConfig("Stitches", true, -40, 3))
                      itemList.add(ItemConfig("Ultrasound", true, -40, 4))
                      itemList.add(ItemConfig("Anesthetic", true, -40, 5))
                      itemList.add(ItemConfig("Defibrillator", true, -40, 6))
                      itemList.add(ItemConfig("Splint", true, -40, 7))
                      itemList.add(ItemConfig("Pin", true, -40, 8))
                  } else {
                      try {
                          val arr = JSONArray(jsonStr)
                          for (i in 0 until arr.length()) {
                              val o = arr.getJSONObject(i)
                              itemList.add(ItemConfig(
                                  itemName = o.getString("itemName"),
                                  enabled = o.optBoolean("enabled", true),
                                  offsetY = o.optInt("offsetY", -40),
                                  priority = o.optInt("priority", i),
                                  randomDelay = o.optBoolean("randomDelay", true)
                              ))
                          }
                      } catch (e: Exception) {
                          itemList.add(ItemConfig("Clamp", true, -40, 0))
                      }
                  }
                  log(itemList.count { it.enabled }.toString() + " items loaded")
              }

              private fun buildNotification(): Notification {
                  return NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("Growtopia AutoClicker")
                      .setContentText("Scanning for items...")
                      .setSmallIcon(android.R.drawable.ic_menu_search)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .setOngoing(true)
                      .build()
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val ch = NotificationChannel(CHANNEL_ID, "Growtopia Clicker", NotificationManager.IMPORTANCE_LOW)
                      ch.setShowBadge(false)
                      (getSystemService(NOTIFICATION_SERVICE) as NotificationManager).createNotificationChannel(ch)
                  }
              }

              override fun onBind(intent: Intent?) = null

              override fun onDestroy() {
                  instance = null
                  isRunning = false
                  try { unregisterReceiver(configReceiver) } catch (_: Exception) {}
                  recognizer.close()
                  super.onDestroy()
              }
          }
          '''

          # === ItemListAdapter.kt ===
          files["app/src/main/java/com/wordclicker/ItemListAdapter.kt"] = '''
          package com.wordclicker

          import android.view.LayoutInflater
          import android.view.View
          import android.view.ViewGroup
          import android.widget.*
          import androidx.recyclerview.widget.RecyclerView

          class ItemListAdapter(
              private val items: MutableList<ItemConfig>,
              private val onDelete: (Int) -> Unit,
              private val onChange: () -> Unit
          ) : RecyclerView.Adapter<ItemListAdapter.VH>() {

              inner class VH(v: View) : RecyclerView.ViewHolder(v) {
                  val tvPriority: TextView = v.findViewById(R.id.tvPriority)
                  val tvItem: TextView = v.findViewById(R.id.tvWord)
                  val swEnabled: Switch = v.findViewById(R.id.switchEnabled)
                  val tvOffset: TextView = v.findViewById(R.id.tvItemOffset)
                  val seekOffset: SeekBar = v.findViewById(R.id.seekItemOffset)
                  val btnDel: Button = v.findViewById(R.id.btnDeleteWord)
                  val btnUp: Button = v.findViewById(R.id.btnMoveUp)
                  val btnDn: Button = v.findViewById(R.id.btnMoveDown)
              }

              override fun onCreateViewHolder(p: ViewGroup, t: Int) =
                  VH(LayoutInflater.from(p.context).inflate(R.layout.item_word, p, false))

              override fun getItemCount() = items.size

              override fun onBindViewHolder(h: VH, pos: Int) {
                  val item = items[pos]
                  h.tvPriority.text = "#" + (pos + 1)
                  h.tvItem.text = item.itemName
                  h.swEnabled.isChecked = item.enabled
                  
                  val progress = item.offsetY + 200
                  h.seekOffset.progress = progress.coerceIn(0, 400)
                  
                  val posText = when {
                      item.offsetY < 0 -> "Click ABOVE " + kotlin.math.abs(item.offsetY) + "px"
                      item.offsetY > 0 -> "Click BELOW " + item.offsetY + "px"
                      else -> "Click ON text"
                  }
                  h.tvOffset.text = posText
                  
                  h.btnUp.alpha = if (pos == 0) 0.3f else 1f
                  h.btnDn.alpha = if (pos == items.size - 1) 0.3f else 1f

                  h.swEnabled.setOnCheckedChangeListener { _, c ->
                      items[h.adapterPosition] = items[h.adapterPosition].copy(enabled = c)
                      onChange()
                  }
                  
                  h.seekOffset.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
                      override fun onProgressChanged(s: SeekBar?, v: Int, u: Boolean) {
                          val offset = v - 200
                          val posDesc = when {
                              offset < 0 -> "Click ABOVE " + kotlin.math.abs(offset) + "px"
                              offset > 0 -> "Click BELOW " + offset + "px"
                              else -> "Click ON text"
                          }
                          h.tvOffset.text = posDesc
                          if (u) items[h.adapterPosition] = items[h.adapterPosition].copy(offsetY = offset)
                      }
                      override fun onStartTrackingTouch(s: SeekBar?) {}
                      override fun onStopTrackingTouch(s: SeekBar?) { onChange() }
                  })
                  
                  h.btnDel.setOnClickListener { 
                      val p = h.adapterPosition
                      if (p >= 0) onDelete(p)
                  }
                  
                  h.btnUp.setOnClickListener {
                      val p = h.adapterPosition
                      if (p > 0) {
                          val t = items[p-1]; items[p-1] = items[p]; items[p] = t
                          notifyItemMoved(p, p-1)
                          notifyItemChanged(p-1)
                          notifyItemChanged(p)
                          onChange()
                      }
                  }
                  
                  h.btnDn.setOnClickListener {
                      val p = h.adapterPosition
                      if (p < items.size - 1) {
                          val t = items[p+1]; items[p+1] = items[p]; items[p] = t
                          notifyItemMoved(p, p+1)
                          notifyItemChanged(p)
                          notifyItemChanged(p+1)
                          onChange()
                      }
                  }
              }
          }
