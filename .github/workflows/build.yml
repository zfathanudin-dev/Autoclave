name: Build AutoClicker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Buat folder
        run: |
          mkdir -p app/src/main/java/com/wordclicker
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

      - name: settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "AutoClicker"
          include ':app'
          EOF

      - name: build.gradle root
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.1' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

      - name: gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: gradle-wrapper.properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.wordclicker'
              compileSdk 34
              defaultConfig {
                  applicationId "com.wordclicker"
                  minSdk 24
                  targetSdk 34
                  versionCode 8
                  versionName "8.0"
              }
              buildTypes {
                  debug { debuggable true }
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.10.1'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.1'
              implementation 'com.google.android.gms:play-services-mlkit-text-recognition:19.0.0'
          }
          EOF

      - name: AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.wordclicker">
              <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE"
                  tools:ignore="ProtectedPermissions"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".ClickerAccessibilityService"
                      android:enabled="true"
                      android:exported="true"
                      android:label="@string/accessibility_service_label"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService"/>
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_service_config"/>
                  </service>
                  <service
                      android:name=".ScreenCaptureService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="mediaProjection"/>
              </application>
          </manifest>
          EOF

      - name: strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Word Auto Clicker</string>
              <string name="accessibility_service_label">Word Auto Clicker</string>
              <string name="accessibility_service_description">Auto klik berdasarkan deteksi teks di layar</string>
          </resources>
          EOF

      - name: accessibility_service_config.xml
        run: |
          cat > app/src/main/res/xml/accessibility_service_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeAllMask"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:canPerformGestures="true"
              android:canRetrieveWindowContent="true"
              android:notificationTimeout="100"
              android:description="@string/accessibility_service_description"/>
          EOF

      - name: drawables
        run: |
          cat > app/src/main/res/drawable/circle_indicator.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#FF4444"/>
              <size android:width="12dp" android:height="12dp"/>
          </shape>
          EOF
          cat > app/src/main/res/drawable/badge_priority.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#00C853"/>
              <size android:width="32dp" android:height="32dp"/>
          </shape>
          EOF

      - name: Tulis semua file via Python
        run: |
          python3 << 'PYEOF'
          import os

          files = {}

          # ── ItemConfig.kt ──────────────────────────────────────────
          files["app/src/main/java/com/wordclicker/ItemConfig.kt"] = """package com.wordclicker

data class ItemConfig(
    val itemName: String,
    val enabled: Boolean = true,
    val offsetY: Int = -60,
    val priority: Int = 0,
    val randomDelay: Boolean = true
) {
    fun getClickY(textCenterY: Float): Float = textCenterY + offsetY
}

enum class ClickMode { PRIORITY, CLICK_ALL }
"""

          # ── ClickerAccessibilityService.kt ─────────────────────────
          files["app/src/main/java/com/wordclicker/ClickerAccessibilityService.kt"] = """package com.wordclicker

import android.accessibilityservice.AccessibilityService
import android.accessibilityservice.GestureDescription
import android.graphics.Path
import android.os.Build
import android.os.Handler
import android.os.Looper
import android.view.accessibility.AccessibilityEvent
import kotlin.random.Random

class ClickerAccessibilityService : AccessibilityService() {

    companion object {
        var instance: ClickerAccessibilityService? = null

        fun performClick(x: Float, y: Float, randomDelay: Boolean = true, onDone: (() -> Unit)? = null) {
            val svc = instance ?: return
            if (Build.VERSION.SDK_INT < Build.VERSION_CODES.N) return
            val delay = if (randomDelay) Random.nextLong(50, 180) else 0L
            Handler(Looper.getMainLooper()).postDelayed({
                try {
                    val path = Path().apply { moveTo(x, y) }
                    val stroke = GestureDescription.StrokeDescription(path, 0, 60)
                    val gesture = GestureDescription.Builder().addStroke(stroke).build()
                    svc.dispatchGesture(gesture, object : GestureResultCallback() {
                        override fun onCompleted(g: GestureDescription) { onDone?.invoke() }
                        override fun onCancelled(g: GestureDescription) {}
                    }, null)
                } catch (e: Exception) {
                    ScreenCaptureService.log("Click error: " + e.message)
                }
            }, delay)
        }

        fun isAvailable() = instance != null
    }

    override fun onServiceConnected() {
        super.onServiceConnected()
        instance = this
        ScreenCaptureService.log("Accessibility Service aktif")
    }

    override fun onDestroy() {
        instance = null
        super.onDestroy()
    }

    override fun onAccessibilityEvent(event: AccessibilityEvent?) {}
    override fun onInterrupt() {}
}
"""

          # ── ScreenCaptureService.kt ────────────────────────────────
          files["app/src/main/java/com/wordclicker/ScreenCaptureService.kt"] = """package com.wordclicker

import android.app.*
import android.content.*
import android.graphics.*
import android.hardware.display.DisplayManager
import android.hardware.display.VirtualDisplay
import android.media.ImageReader
import android.media.projection.MediaProjection
import android.media.projection.MediaProjectionManager
import android.os.*
import android.util.DisplayMetrics
import android.view.WindowManager
import androidx.core.app.NotificationCompat
import com.google.android.gms.tasks.Tasks
import com.google.mlkit.vision.common.InputImage
import com.google.mlkit.vision.text.TextRecognition
import com.google.mlkit.vision.text.latin.TextRecognizerOptions
import org.json.JSONArray
import java.text.SimpleDateFormat
import java.util.*
import kotlin.random.Random

class ScreenCaptureService : Service() {

    companion object {
        var instance: ScreenCaptureService? = null
        var logCallback: ((String) -> Unit)? = null
        var isRunning = false

        fun log(msg: String) {
            val time = SimpleDateFormat("HH:mm:ss", Locale.getDefault()).format(Date())
            logCallback?.invoke("[\$time] \$msg")
            android.util.Log.d("AutoClicker", msg)
        }

        const val ACTION_START  = "START"
        const val ACTION_STOP   = "STOP"
        const val EXTRA_RESULT_CODE = "RESULT_CODE"
        const val EXTRA_RESULT_DATA = "RESULT_DATA"
        const val CHANNEL_ID    = "AutoClickerChannel"
    }

    private var mediaProjection: MediaProjection? = null
    private var virtualDisplay: VirtualDisplay? = null
    private var imageReader: ImageReader? = null
    private val handler = Handler(Looper.getMainLooper())

    // Inisialisasi lazy supaya tidak crash saat service dibuat
    private val recognizer by lazy {
        TextRecognition.getClient(TextRecognizerOptions.DEFAULT_OPTIONS)
    }

    private var screenWidth  = 1080
    private var screenHeight = 1920
    private var screenDensity = 1

    private var isScanning    = false
    private var itemList      = mutableListOf<ItemConfig>()
    private var clickMode     = ClickMode.PRIORITY
    private var scanIntervalMs = 1200L
    private var antiBanMode   = true

    private val configReceiver = object : BroadcastReceiver() {
        override fun onReceive(ctx: Context?, intent: Intent?) { loadConfig() }
    }

    override fun onCreate() {
        super.onCreate()
        instance = this
        createNotificationChannel()
        loadConfig()
        val filter = IntentFilter("com.wordclicker.UPDATE_CONFIG")
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
            registerReceiver(configReceiver, filter, RECEIVER_NOT_EXPORTED)
        } else {
            @Suppress("UnspecifiedRegisterReceiverFlag")
            registerReceiver(configReceiver, filter)
        }
    }

    override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
        when (intent?.action) {
            ACTION_START -> {
                val code = intent.getIntExtra(EXTRA_RESULT_CODE, -1)
                val data = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                    intent.getParcelableExtra(EXTRA_RESULT_DATA, Intent::class.java)
                else @Suppress("DEPRECATION") intent.getParcelableExtra(EXTRA_RESULT_DATA)
                if (data != null) startCapture(code, data)
            }
            ACTION_STOP -> stopCapture()
        }
        return START_STICKY
    }

    private fun startCapture(resultCode: Int, resultData: Intent) {
        startForeground(1, buildNotification())
        val wm = getSystemService(WINDOW_SERVICE) as WindowManager
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
            val b = wm.currentWindowMetrics.bounds
            screenWidth  = b.width()
            screenHeight = b.height()
            screenDensity = resources.displayMetrics.densityDpi
        } else {
            val m = DisplayMetrics()
            @Suppress("DEPRECATION") wm.defaultDisplay.getMetrics(m)
            screenWidth   = m.widthPixels
            screenHeight  = m.heightPixels
            screenDensity = m.densityDpi
        }
        val mpm = getSystemService(MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
        mediaProjection = mpm.getMediaProjection(resultCode, resultData)
        imageReader = ImageReader.newInstance(screenWidth, screenHeight, PixelFormat.RGBA_8888, 2)
        virtualDisplay = mediaProjection?.createVirtualDisplay(
            "AutoClickerCapture", screenWidth, screenHeight, screenDensity,
            DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR,
            imageReader?.surface, null, null
        )
        isRunning  = true
        isScanning = false
        log("Scan dimulai (\${screenWidth}x\${screenHeight})")
        scheduleNextScan()
    }

    private fun stopCapture() {
        isRunning = false
        handler.removeCallbacksAndMessages(null)
        virtualDisplay?.release()
        imageReader?.close()
        mediaProjection?.stop()
        virtualDisplay  = null
        imageReader     = null
        mediaProjection = null
        stopForeground(STOP_FOREGROUND_REMOVE)
        stopSelf()
        log("Scan dihentikan")
    }

    private fun scheduleNextScan() {
        if (!isRunning) return
        val delay = if (antiBanMode)
            (scanIntervalMs + Random.nextLong(-150, 250)).coerceAtLeast(400)
        else scanIntervalMs
        handler.postDelayed({
            if (isRunning && !isScanning) doScan()
            else if (isRunning) scheduleNextScan()
        }, delay)
    }

    private fun doScan() {
        val reader = imageReader ?: run { scheduleNextScan(); return }
        val image  = reader.acquireLatestImage() ?: run { scheduleNextScan(); return }
        isScanning = true
        try {
            val planes     = image.planes[0]
            val rowPadding = planes.rowStride - planes.pixelStride * screenWidth
            val bmp = Bitmap.createBitmap(
                screenWidth + rowPadding / planes.pixelStride,
                screenHeight, Bitmap.Config.ARGB_8888
            )
            bmp.copyPixelsFromBuffer(planes.buffer)
            image.close()
            val cropped = Bitmap.createBitmap(bmp, 0, 0, screenWidth, screenHeight)
            bmp.recycle()

            val enabled = itemList.filter { it.enabled }
            if (enabled.isEmpty()) {
                cropped.recycle(); isScanning = false; scheduleNextScan(); return
            }

            // Gunakan Tasks.await di background thread supaya tidak crash
            Thread {
                try {
                    val inputImage = InputImage.fromBitmap(cropped, 0)
                    val result = Tasks.await(recognizer.process(inputImage))
                    processOcrResult(result, enabled)
                } catch (e: Exception) {
                    log("OCR error: \${e.message}")
                } finally {
                    cropped.recycle()
                    isScanning = false
                    handler.post { scheduleNextScan() }
                }
            }.start()

        } catch (e: Exception) {
            try { image.close() } catch (_: Exception) {}
            log("Capture error: \${e.message}")
            isScanning = false
            scheduleNextScan()
        }
    }

    private fun processOcrResult(result: com.google.mlkit.vision.text.Text, targets: List<ItemConfig>) {
        data class Found(val cfg: ItemConfig, val cx: Float, val cy: Float, val pri: Int)
        val found = mutableListOf<Found>()

        for (block in result.textBlocks) {
            for (line in block.lines) {
                val lineText = line.text.trim()
                for ((pri, cfg) in targets.withIndex()) {
                    if (lineText.contains(cfg.itemName, ignoreCase = true)) {
                        val box = line.boundingBox ?: continue
                        val cx  = box.centerX().toFloat()
                        val cy  = cfg.getClickY(box.centerY().toFloat())
                        if (cx > 30 && cx < screenWidth - 30 && cy > 30 && cy < screenHeight - 30) {
                            found.add(Found(cfg, cx, cy, pri))
                            val dir = when { cfg.offsetY < 0 -> "atas" ; cfg.offsetY > 0 -> "bawah" ; else -> "tepat" }
                            log("Ketemu '\${cfg.itemName}' klik \$dir (\${cx.toInt()},\${cy.toInt()})")
                        }
                    }
                }
            }
        }

        if (found.isEmpty()) return
        if (!ClickerAccessibilityService.isAvailable()) {
            log("Accessibility belum aktif!")
            return
        }

        when (clickMode) {
            ClickMode.PRIORITY -> {
                val best = found.minByOrNull { it.pri } ?: return
                log("Klik prioritas #\${best.pri+1} '\${best.cfg.itemName}'")
                ClickerAccessibilityService.performClick(best.cx, best.cy, best.cfg.randomDelay) {
                    log("Klik berhasil")
                }
            }
            ClickMode.CLICK_ALL -> {
                val sorted = found.sortedBy { it.pri }
                    .distinctBy { "\${it.cx.toInt()},\${it.cy.toInt()}" }
                    .take(5)
                for (f in sorted) {
                    log("Klik semua '\${f.cfg.itemName}'")
                    ClickerAccessibilityService.performClick(f.cx, f.cy, f.cfg.randomDelay)
                    Thread.sleep(Random.nextLong(200, 450))
                }
            }
        }
    }

    private fun loadConfig() {
        val p = getSharedPreferences("AutoClickerPrefs", Context.MODE_PRIVATE)
        clickMode     = if (p.getString("click_mode","PRIORITY") == "PRIORITY") ClickMode.PRIORITY else ClickMode.CLICK_ALL
        scanIntervalMs = p.getInt("scan_interval_ms", 1200).toLong()
        antiBanMode   = p.getBoolean("anti_ban", true)
        itemList.clear()
        val json = p.getString("item_list", "") ?: ""
        if (json.isEmpty()) {
            listOf("Clamp","Transfusion","Scalpel","Stitches","Ultrasound",
                   "Anesthetic","Defibrillator","Splint","Pin")
                .forEachIndexed { i, name -> itemList.add(ItemConfig(name, true, -40, i)) }
        } else {
            try {
                val arr = JSONArray(json)
                for (i in 0 until arr.length()) {
                    val o = arr.getJSONObject(i)
                    itemList.add(ItemConfig(
                        itemName    = o.getString("itemName"),
                        enabled     = o.optBoolean("enabled", true),
                        offsetY     = o.optInt("offsetY", -40),
                        priority    = o.optInt("priority", i),
                        randomDelay = o.optBoolean("randomDelay", true)
                    ))
                }
            } catch (_: Exception) {
                itemList.add(ItemConfig("Clamp", true, -40, 0))
            }
        }
        log("\${itemList.count{it.enabled}} item aktif | mode: \${if(clickMode==ClickMode.PRIORITY)"Prioritas" else "Semua"} | interval: \${scanIntervalMs}ms")
    }

    private fun buildNotification() = NotificationCompat.Builder(this, CHANNEL_ID)
        .setContentTitle("Word Auto Clicker")
        .setContentText("Memindai layar...")
        .setSmallIcon(android.R.drawable.ic_menu_view)
        .setPriority(NotificationCompat.PRIORITY_LOW)
        .setOngoing(true)
        .build()

    private fun createNotificationChannel() {
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
            val ch = NotificationChannel(CHANNEL_ID, "Auto Clicker", NotificationManager.IMPORTANCE_LOW)
            ch.setShowBadge(false)
            (getSystemService(NOTIFICATION_SERVICE) as NotificationManager).createNotificationChannel(ch)
        }
    }

    override fun onBind(intent: Intent?) = null

    override fun onDestroy() {
        instance  = null
        isRunning = false
        try { unregisterReceiver(configReceiver) } catch (_: Exception) {}
        try { recognizer.close() } catch (_: Exception) {}
        super.onDestroy()
    }
}
"""

          # ── ItemListAdapter.kt ─────────────────────────────────────
          files["app/src/main/java/com/wordclicker/ItemListAdapter.kt"] = """package com.wordclicker

import android.view.*
import android.widget.*
import androidx.recyclerview.widget.RecyclerView
import kotlin.math.abs

class ItemListAdapter(
    private val items: MutableList<ItemConfig>,
    private val onDelete: (Int) -> Unit,
    private val onChange: () -> Unit
) : RecyclerView.Adapter<ItemListAdapter.VH>() {

    inner class VH(v: View) : RecyclerView.ViewHolder(v) {
        val tvPriority: TextView  = v.findViewById(R.id.tvPriority)
        val tvItem: TextView      = v.findViewById(R.id.tvWord)
        val swEnabled: Switch     = v.findViewById(R.id.switchEnabled)
        val tvOffset: TextView    = v.findViewById(R.id.tvItemOffset)
        val seekOffset: SeekBar   = v.findViewById(R.id.seekItemOffset)
        val btnDel: Button        = v.findViewById(R.id.btnDeleteWord)
        val btnUp: Button         = v.findViewById(R.id.btnMoveUp)
        val btnDn: Button         = v.findViewById(R.id.btnMoveDown)
    }

    override fun onCreateViewHolder(p: ViewGroup, t: Int) =
        VH(LayoutInflater.from(p.context).inflate(R.layout.item_word, p, false))

    override fun getItemCount() = items.size

    private fun offsetLabel(offset: Int) = when {
        offset < 0 -> "Klik ATAS \${abs(offset)}px"
        offset > 0 -> "Klik BAWAH \${offset}px"
        else       -> "Klik TEPAT di teks"
    }

    override fun onBindViewHolder(h: VH, pos: Int) {
        val item = items[pos]
        h.tvPriority.text     = "#\${pos + 1}"
        h.tvItem.text         = item.itemName
        h.swEnabled.isChecked = item.enabled
        h.seekOffset.progress = (item.offsetY + 200).coerceIn(0, 400)
        h.tvOffset.text       = offsetLabel(item.offsetY)
        h.btnUp.alpha         = if (pos == 0) 0.3f else 1f
        h.btnDn.alpha         = if (pos == items.size - 1) 0.3f else 1f

        h.swEnabled.setOnCheckedChangeListener { _, c ->
            items[h.adapterPosition] = items[h.adapterPosition].copy(enabled = c); onChange()
        }
        h.seekOffset.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
            override fun onProgressChanged(s: SeekBar?, v: Int, u: Boolean) {
                val off = v - 200
                h.tvOffset.text = offsetLabel(off)
                if (u) items[h.adapterPosition] = items[h.adapterPosition].copy(offsetY = off)
            }
            override fun onStartTrackingTouch(s: SeekBar?) {}
            override fun onStopTrackingTouch(s: SeekBar?) { onChange() }
        })
        h.btnDel.setOnClickListener { val p = h.adapterPosition; if (p >= 0) onDelete(p) }
        h.btnUp.setOnClickListener {
            val p = h.adapterPosition
            if (p > 0) { val t = items[p-1]; items[p-1]=items[p]; items[p]=t
                notifyItemMoved(p,p-1); notifyItemChanged(p-1); notifyItemChanged(p); onChange() }
        }
        h.btnDn.setOnClickListener {
            val p = h.adapterPosition
            if (p < items.size-1) { val t = items[p+1]; items[p+1]=items[p]; items[p]=t
                notifyItemMoved(p,p+1); notifyItemChanged(p); notifyItemChanged(p+1); onChange() }
        }
    }
}
"""

          # ── MainActivity.kt ────────────────────────────────────────
          files["app/src/main/java/com/wordclicker/MainActivity.kt"] = """package com.wordclicker

import android.accessibilityservice.AccessibilityServiceInfo
import android.app.Activity
import android.content.*
import android.media.projection.MediaProjectionManager
import android.os.*
import android.provider.Settings
import android.text.*
import android.view.accessibility.AccessibilityManager
import android.widget.*
import androidx.activity.result.contract.ActivityResultContracts
import androidx.appcompat.app.AppCompatActivity
import androidx.core.content.ContextCompat
import androidx.recyclerview.widget.LinearLayoutManager
import androidx.recyclerview.widget.RecyclerView
import org.json.JSONArray
import org.json.JSONObject

class MainActivity : AppCompatActivity() {

    private lateinit var prefs: SharedPreferences
    private lateinit var adapter: ItemListAdapter
    private val itemList = mutableListOf<ItemConfig>()

    private lateinit var btnAccess: Button
    private lateinit var btnCapture: Button
    private lateinit var indAccess: android.view.View
    private lateinit var indCapture: android.view.View
    private lateinit var tvAccessStatus: TextView
    private lateinit var tvCaptureStatus: TextView
    private lateinit var etItem: EditText
    private lateinit var seekOffset: SeekBar
    private lateinit var tvOffset: TextView
    private lateinit var rv: RecyclerView
    private lateinit var btnAdd: Button
    private lateinit var etScanInterval: EditText
    private lateinit var tvLog: TextView
    private lateinit var btnClear: Button
    private lateinit var rgMode: RadioGroup
    private lateinit var rbPriority: RadioButton
    private lateinit var rbAll: RadioButton
    private lateinit var swAntiBan: Switch

    private val captureLauncher =
        registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
            if (result.resultCode == Activity.RESULT_OK && result.data != null) {
                val i = Intent(this, ScreenCaptureService::class.java).apply {
                    action = ScreenCaptureService.ACTION_START
                    putExtra(ScreenCaptureService.EXTRA_RESULT_CODE, result.resultCode)
                    putExtra(ScreenCaptureService.EXTRA_RESULT_DATA, result.data)
                }
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(i)
                else startService(i)
                Handler(Looper.getMainLooper()).postDelayed({ updateCaptureStatus() }, 800)
            } else {
                Toast.makeText(this, "Izin ditolak", Toast.LENGTH_SHORT).show()
            }
        }

    override fun onCreate(s: Bundle?) {
        super.onCreate(s)
        setContentView(R.layout.activity_main)
        prefs = getSharedPreferences("AutoClickerPrefs", Context.MODE_PRIVATE)

        btnAccess     = findViewById(R.id.btnToggleAccess)
        btnCapture    = findViewById(R.id.btnToggleCapture)
        indAccess     = findViewById(R.id.indicatorAccess)
        indCapture    = findViewById(R.id.indicatorCapture)
        tvAccessStatus  = findViewById(R.id.tvAccessStatus)
        tvCaptureStatus = findViewById(R.id.tvCaptureStatus)
        etItem        = findViewById(R.id.etNewWord)
        seekOffset    = findViewById(R.id.seekOffsetAbove)
        tvOffset      = findViewById(R.id.tvOffsetAbove)
        rv            = findViewById(R.id.rvWordList)
        btnAdd        = findViewById(R.id.btnAddWord)
        etScanInterval = findViewById(R.id.etScanInterval)
        tvLog         = findViewById(R.id.tvLog)
        btnClear      = findViewById(R.id.btnClearLog)
        rgMode        = findViewById(R.id.rgClickMode)
        rbPriority    = findViewById(R.id.rbPriority)
        rbAll         = findViewById(R.id.rbClickAll)
        swAntiBan     = findViewById(R.id.switchAntiBan)

        loadSettings()
        setupRv()
        setupListeners()

        ScreenCaptureService.logCallback = { msg ->
            runOnUiThread {
                val t = tvLog.text.toString()
                val lines = if (t.length > 3000) t.takeLast(2000) else t
                tvLog.text = "\$lines\\n\$msg"
            }
        }
    }

    override fun onResume() { super.onResume(); updateAccessStatus(); updateCaptureStatus() }

    private fun offsetLabel(progress: Int): String {
        val off = progress - 200
        return when { off < 0 -> "Klik ATAS \${-off}px" ; off > 0 -> "Klik BAWAH \${off}px" ; else -> "Klik TEPAT di teks" }
    }

    private fun loadSettings() {
        if (prefs.getString("click_mode","PRIORITY") == "PRIORITY") rbPriority.isChecked = true else rbAll.isChecked = true
        etScanInterval.setText(prefs.getInt("scan_interval_ms", 1200).toString())
        swAntiBan.isChecked = prefs.getBoolean("anti_ban", true)
        seekOffset.progress = 160
        tvOffset.text = offsetLabel(160)
        itemList.clear()
        val json = prefs.getString("item_list","") ?: ""
        if (json.isEmpty()) {
            listOf("Clamp","Transfusion","Scalpel","Stitches","Ultrasound",
                   "Anesthetic","Defibrillator","Splint","Pin")
                .forEachIndexed { i, n -> itemList.add(ItemConfig(n, true, -40, i)) }
            saveSettings()
        } else {
            try {
                val arr = JSONArray(json)
                for (i in 0 until arr.length()) {
                    val o = arr.getJSONObject(i)
                    itemList.add(ItemConfig(o.getString("itemName"), o.optBoolean("enabled",true), o.optInt("offsetY",-40), o.optInt("priority",i), o.optBoolean("randomDelay",true)))
                }
            } catch (_: Exception) { itemList.add(ItemConfig("Clamp",true,-40,0)) }
        }
    }

    private fun saveSettings() {
        val arr = JSONArray()
        itemList.forEachIndexed { i, w ->
            val o = JSONObject()
            o.put("itemName", w.itemName); o.put("enabled", w.enabled)
            o.put("offsetY", w.offsetY); o.put("priority", i)
            o.put("randomDelay", w.randomDelay); arr.put(o)
        }
        prefs.edit()
            .putString("item_list", arr.toString())
            .putString("click_mode", if (rbPriority.isChecked) "PRIORITY" else "CLICK_ALL")
            .putInt("scan_interval_ms", etScanInterval.text.toString().toIntOrNull() ?: 1200)
            .putBoolean("anti_ban", swAntiBan.isChecked)
            .apply()
        sendBroadcast(Intent("com.wordclicker.UPDATE_CONFIG"))
    }

    private fun setupRv() {
        adapter = ItemListAdapter(itemList,
            { pos -> itemList.removeAt(pos); adapter.notifyItemRemoved(pos); saveSettings() },
            { saveSettings() }
        )
        rv.layoutManager = LinearLayoutManager(this); rv.adapter = adapter
    }

    private fun setupListeners() {
        btnAccess.setOnClickListener {
            startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
            Toast.makeText(this,"Cari 'Word Auto Clicker' lalu aktifkan",Toast.LENGTH_LONG).show()
        }
        btnCapture.setOnClickListener {
            if (ScreenCaptureService.isRunning) {
                startService(Intent(this, ScreenCaptureService::class.java).apply { action = ScreenCaptureService.ACTION_STOP })
                Handler(Looper.getMainLooper()).postDelayed({ updateCaptureStatus() }, 500)
            } else {
                if (!isAccessibilityEnabled()) {
                    Toast.makeText(this,"Aktifkan Accessibility Service dulu!",Toast.LENGTH_LONG).show()
                    return@setOnClickListener
                }
                val mpm = getSystemService(MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                captureLauncher.launch(mpm.createScreenCaptureIntent())
            }
        }
        btnAdd.setOnClickListener {
            val name = etItem.text.toString().trim()
            if (name.isEmpty()) { etItem.error = "Masukkan nama"; return@setOnClickListener }
            if (itemList.any { it.itemName.equals(name,true) }) { Toast.makeText(this,"Sudah ada!",Toast.LENGTH_SHORT).show(); return@setOnClickListener }
            val offset = seekOffset.progress - 200
            itemList.add(ItemConfig(name, true, offset, itemList.size))
            adapter.notifyItemInserted(itemList.size - 1)
            etItem.setText(""); saveSettings()
        }
        seekOffset.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
            override fun onProgressChanged(s: SeekBar?, v: Int, u: Boolean) { tvOffset.text = offsetLabel(v) }
            override fun onStartTrackingTouch(s: SeekBar?) {}
            override fun onStopTrackingTouch(s: SeekBar?) {}
        })
        rgMode.setOnCheckedChangeListener { _, _ -> saveSettings() }
        swAntiBan.setOnCheckedChangeListener { _, _ -> saveSettings() }
        etScanInterval.addTextChangedListener(object : TextWatcher {
            override fun afterTextChanged(s: Editable?) { saveSettings() }
            override fun beforeTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
            override fun onTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
        })
        btnClear.setOnClickListener { tvLog.text = "" }
    }

    private fun isAccessibilityEnabled(): Boolean {
        val am = getSystemService(ACCESSIBILITY_SERVICE) as AccessibilityManager
        return am.getEnabledAccessibilityServiceList(AccessibilityServiceInfo.FEEDBACK_ALL_MASK)
            .any { it.id.contains("wordclicker", true) }
    }

    private fun updateAccessStatus() {
        val on = isAccessibilityEnabled()
        indAccess.backgroundTintList = ContextCompat.getColorStateList(this, if (on) android.R.color.holo_green_light else android.R.color.holo_red_light)
        tvAccessStatus.text = if (on) "Aktif" else "Tidak Aktif"
        tvAccessStatus.setTextColor(ContextCompat.getColor(this, if (on) android.R.color.holo_green_dark else android.R.color.holo_red_dark))
        btnAccess.text = if (on) "Kelola" else "Aktifkan"
    }

    private fun updateCaptureStatus() {
        val on = ScreenCaptureService.isRunning
        indCapture.backgroundTintList = ContextCompat.getColorStateList(this, if (on) android.R.color.holo_green_light else android.R.color.holo_red_light)
        tvCaptureStatus.text = if (on) "Berjalan" else "Berhenti"
        tvCaptureStatus.setTextColor(ContextCompat.getColor(this, if (on) android.R.color.holo_green_dark else android.R.color.holo_red_dark))
        btnCapture.text = if (on) "Stop" else "Mulai Scan"
        btnCapture.backgroundTintList = ContextCompat.getColorStateList(this, if (on) android.R.color.holo_red_light else android.R.color.holo_green_light)
    }
}
