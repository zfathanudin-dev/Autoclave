      - name: Kotlin source files
        run: |
          python3 - << 'PYEOF'
          import os

          files = {}

          files["app/src/main/java/com/wordclicker/WordConfig.kt"] = r"""package com.wordclicker

          data class WordConfig(
              val word: String,
              val enabled: Boolean,
              val clickAbove: Boolean,
              val clickOnWord: Boolean,
              val offsetAbove: Int
          )

          enum class ClickMode { PRIORITY, CLICK_ALL }
          """

          files["app/src/main/java/com/wordclicker/WordClickerAccessibilityService.kt"] = r"""package com.wordclicker

          import android.accessibilityservice.AccessibilityService
          import android.accessibilityservice.GestureDescription
          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import android.content.IntentFilter
          import android.content.SharedPreferences
          import android.graphics.Path
          import android.graphics.Rect
          import android.os.Build
          import android.os.Handler
          import android.os.Looper
          import android.view.accessibility.AccessibilityEvent
          import android.view.accessibility.AccessibilityNodeInfo
          import org.json.JSONArray
          import java.text.SimpleDateFormat
          import java.util.Date
          import java.util.Locale

          class WordClickerAccessibilityService : AccessibilityService() {

              companion object {
                  var logCallback: ((String) -> Unit)? = null
              }

              private lateinit var prefs: SharedPreferences
              private val handler = Handler(Looper.getMainLooper())
              private var isProcessing = false
              private var wordList = mutableListOf<WordConfig>()
              private var clickMode = ClickMode.PRIORITY
              private val sdf = SimpleDateFormat("HH:mm:ss", Locale.getDefault())

              private val configReceiver = object : BroadcastReceiver() {
                  override fun onReceive(ctx: Context?, intent: Intent?) {
                      loadConfig()
                      log("Config diperbarui")
                  }
              }

              override fun onServiceConnected() {
                  prefs = getSharedPreferences("WordClickerPrefs", Context.MODE_PRIVATE)
                  loadConfig()
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(configReceiver, IntentFilter("com.wordclicker.UPDATE_CONFIG"), RECEIVER_NOT_EXPORTED)
                  } else {
                      @Suppress("UnspecifiedRegisterReceiverFlag")
                      registerReceiver(configReceiver, IntentFilter("com.wordclicker.UPDATE_CONFIG"))
                  }
                  log("Service aktif")
              }

              override fun onDestroy() {
                  try { unregisterReceiver(configReceiver) } catch (e: Exception) { }
                  log("Service berhenti")
              }

              override fun onInterrupt() {}

              override fun onAccessibilityEvent(event: AccessibilityEvent?) {
                  if (event == null || isProcessing) return
                  val relevant = setOf(
                      AccessibilityEvent.TYPE_WINDOW_CONTENT_CHANGED,
                      AccessibilityEvent.TYPE_WINDOW_STATE_CHANGED,
                      AccessibilityEvent.TYPE_VIEW_SCROLLED
                  )
                  if (event.eventType !in relevant) return
                  val enabled = wordList.filter { it.enabled }
                  if (enabled.isEmpty()) return
                  isProcessing = true
                  handler.post {
                      try {
                          val root = rootInActiveWindow ?: return@post
                          if (clickMode == ClickMode.PRIORITY) scanPriority(root, enabled)
                          else scanAll(root, enabled)
                          root.recycle()
                      } finally {
                          handler.postDelayed({ isProcessing = false }, prefs.getInt("delay_ms", 500).toLong())
                      }
                  }
              }

              private fun scanPriority(root: AccessibilityNodeInfo, targets: List<WordConfig>) {
                  for ((i, cfg) in targets.withIndex()) {
                      val nodes = root.findAccessibilityNodeInfosByText(cfg.word) ?: continue
                      val node = nodes.firstOrNull { it.text?.contains(cfg.word, true) == true }
                      if (node == null) { nodes.forEach { it.recycle() }; continue }
                      val b = Rect()
                      node.getBoundsInScreen(b)
                      if (b.isEmpty) { node.recycle(); continue }
                      log("Prioritas #${i + 1} '${cfg.word}' ditemukan")
                      doClick(cfg, b.centerX().toFloat(), b.centerY().toFloat())
                      node.recycle()
                      return
                  }
              }

              private fun scanAll(root: AccessibilityNodeInfo, targets: List<WordConfig>) {
                  for (cfg in targets) {
                      val nodes = root.findAccessibilityNodeInfosByText(cfg.word) ?: continue
                      val node = nodes.firstOrNull { it.text?.contains(cfg.word, true) == true }
                      if (node == null) { nodes.forEach { it.recycle() }; continue }
                      val b = Rect()
                      node.getBoundsInScreen(b)
                      if (b.isEmpty) { node.recycle(); continue }
                      log("Klik semua: '${cfg.word}'")
                      doClick(cfg, b.centerX().toFloat(), b.centerY().toFloat())
                      node.recycle()
                      Thread.sleep(prefs.getInt("delay_ms", 500).toLong())
                  }
              }

              private fun doClick(cfg: WordConfig, cx: Float, cy: Float) {
                  if (cfg.clickAbove) click(cx, cy - cfg.offsetAbove)
                  if (cfg.clickOnWord) click(cx, cy + prefs.getInt("offset_on_word", 0))
              }

              private fun click(x: Float, y: Float) {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.N) return
                  val path = Path().apply { moveTo(x, y) }
                  val stroke = GestureDescription.StrokeDescription(path, 0, 50)
                  val gesture = GestureDescription.Builder().addStroke(stroke).build()
                  dispatchGesture(gesture, null, null)
                  log("Klik (${x.toInt()}, ${y.toInt()})")
              }

              private fun loadConfig() {
                  clickMode = if (prefs.getString("click_mode", "PRIORITY") == "PRIORITY")
                      ClickMode.PRIORITY else ClickMode.CLICK_ALL
                  wordList.clear()
                  val arr = JSONArray(prefs.getString("word_list", "[]") ?: "[]")
                  for (i in 0 until arr.length()) {
                      val o = arr.getJSONObject(i)
                      wordList.add(WordConfig(
                          word = o.getString("word"),
                          enabled = o.getBoolean("enabled"),
                          clickAbove = o.optBoolean("clickAbove", true),
                          clickOnWord = o.optBoolean("clickOnWord", false),
                          offsetAbove = o.optInt("offsetAbove", 80)
                      ))
                  }
              }

              private fun log(msg: String) {
                  logCallback?.invoke("[${sdf.format(Date())}] $msg")
              }
          }
