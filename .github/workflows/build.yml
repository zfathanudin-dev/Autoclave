name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Buat folder struktur
        run: |
          mkdir -p app/src/main/java/com/wordclicker
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

      - name: settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "WordClicker"
          include ':app'
          EOF

      - name: build.gradle root
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.1' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

      - name: gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

      - name: gradle-wrapper.properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.wordclicker'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.wordclicker"
                  minSdk 24
                  targetSdk 34
                  versionCode 3
                  versionName "3.0"
              }
              
              buildTypes {
                  release { 
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              
              kotlinOptions { 
                  jvmTarget = '17' 
              }
              
              buildFeatures {
                  viewBinding true
              }
          }
          
          dependencies {
              implementation 'androidx.core:core-ktx:1.10.1'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.1'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              
              // ML Kit OCR
              implementation 'com.google.mlkit:text-recognition:16.0.1'
          }
          EOF

      - name: AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.wordclicker">

              <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE"
                  tools:ignore="ProtectedPermissions"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>

              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.DayNight.NoActionBar">

                  <activity 
                      android:name=".MainActivity" 
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".ClickerAccessibilityService"
                      android:exported="true"
                      android:label="@string/accessibility_service_label"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService"/>
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_service_config"/>
                  </service>

                  <service
                      android:name=".ScreenCaptureService"
                      android:exported="false"
                      android:foregroundServiceType="mediaProjection"/>

              </application>
          </manifest>
          EOF

      - name: strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Word Auto Clicker</string>
              <string name="accessibility_service_label">Word Auto Clicker</string>
              <string name="accessibility_service_description">Diperlukan untuk melakukan klik otomatis di layar</string>
          </resources>
          EOF

      - name: accessibility_service_config.xml
        run: |
          cat > app/src/main/res/xml/accessibility_service_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeAllMask"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:canPerformGestures="true"
              android:canRetrieveWindowContent="true"
              android:notificationTimeout="100"
              android:description="@string/accessibility_service_description"/>
          EOF

      - name: drawables
        run: |
          cat > app/src/main/res/drawable/circle_indicator.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#FF4444"/>
              <size android:width="12dp" android:height="12dp"/>
          </shape>
          EOF
          
          cat > app/src/main/res/drawable/badge_priority.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#5B5FEF"/>
              <size android:width="32dp" android:height="32dp"/>
          </shape>
          EOF

      - name: Generate Kotlin & XML files via Python
        run: |
          python3 << 'PYEOF'
          import os

          files = {}

          # [Semua file Kotlin dan XML Anda tetap sama seperti sebelumnya]
          # WordConfig.kt, ClickerAccessibilityService.kt, ScreenCaptureService.kt,
          # WordListAdapter.kt, MainActivity.kt, activity_main.xml, item_word.xml
          
          # ... (copy semua definisi files dari workflow Anda sebelumnya) ...

          for path, content in files.items():
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)
              print(f"Created: {path}")
          PYEOF

      - name: Download Gradle wrapper
        run: |
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -O gradlew
          chmod +x gradlew
          wget -q "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
               -O gradle/wrapper/gradle-wrapper.jar

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WordAutoClicker-v3-OCR
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
