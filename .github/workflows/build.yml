          # === MainActivity.kt ===
          files["app/src/main/java/com/wordclicker/MainActivity.kt"] = '''
          package com.wordclicker

          import android.accessibilityservice.AccessibilityServiceInfo
          import android.app.Activity
          import android.content.*
          import android.media.projection.MediaProjectionManager
          import android.os.*
          import android.provider.Settings
          import android.text.*
          import android.view.accessibility.AccessibilityManager
          import android.widget.*
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import org.json.JSONArray
          import org.json.JSONObject

          class MainActivity : AppCompatActivity() {

              private lateinit var prefs: SharedPreferences
              private lateinit var adapter: ItemListAdapter
              private val itemList = mutableListOf<ItemConfig>()

              private lateinit var btnAccess: Button
              private lateinit var btnCapture: Button
              private lateinit var indicatorAccess: android.view.View
              private lateinit var indicatorCapture: android.view.View
              private lateinit var tvAccessStatus: TextView
              private lateinit var tvCaptureStatus: TextView
              private lateinit var etItem: EditText
              private lateinit var seekOffset: SeekBar
              private lateinit var tvOffset: TextView
              private lateinit var rv: RecyclerView
              private lateinit var btnAdd: Button
              private lateinit var etScanInterval: EditText
              private lateinit var tvLog: TextView
              private lateinit var btnClear: Button
              private lateinit var rgMode: RadioGroup
              private lateinit var rbPriority: RadioButton
              private lateinit var rbAll: RadioButton
              private lateinit var swAntiBan: Switch

              private val capturePermissionLauncher =
                  registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                      if (result.resultCode == Activity.RESULT_OK && result.data != null) {
                          val intent = Intent(this, ScreenCaptureService::class.java).apply {
                              action = ScreenCaptureService.ACTION_START
                              putExtra(ScreenCaptureService.EXTRA_RESULT_CODE, result.resultCode)
                              putExtra(ScreenCaptureService.EXTRA_RESULT_DATA, result.data)
                          }
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)
                              startForegroundService(intent)
                          else
                              startService(intent)
                      } else {
                          Toast.makeText(this, "Permission denied", Toast.LENGTH_SHORT).show()
                      }
                  }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  prefs = getSharedPreferences("GrowtopiaClickerPrefs", Context.MODE_PRIVATE)

                  btnAccess = findViewById(R.id.btnToggleAccess)
                  btnCapture = findViewById(R.id.btnToggleCapture)
                  indicatorAccess = findViewById(R.id.indicatorAccess)
                  indicatorCapture = findViewById(R.id.indicatorCapture)
                  tvAccessStatus = findViewById(R.id.tvAccessStatus)
                  tvCaptureStatus = findViewById(R.id.tvCaptureStatus)
                  etItem = findViewById(R.id.etNewWord)
                  seekOffset = findViewById(R.id.seekOffsetAbove)
                  tvOffset = findViewById(R.id.tvOffsetAbove)
                  rv = findViewById(R.id.rvWordList)
                  btnAdd = findViewById(R.id.btnAddWord)
                  etScanInterval = findViewById(R.id.etScanInterval)
                  tvLog = findViewById(R.id.tvLog)
                  btnClear = findViewById(R.id.btnClearLog)
                  rgMode = findViewById(R.id.rgClickMode)
                  rbPriority = findViewById(R.id.rbPriority)
                  rbAll = findViewById(R.id.rbClickAll)
                  swAntiBan = findViewById(R.id.switchAntiBan)

                  loadSettings()
                  setupRecyclerView()
                  setupListeners()

                  ScreenCaptureService.logCallback = { msg ->
                      runOnUiThread {
                          val current = tvLog.text.toString()
                          val lines = if (current.length > 2000) current.substring(current.length - 2000) else current
                          tvLog.text = lines + "\\n" + msg
                      }
                  }
              }

              override fun onResume() {
                  super.onResume()
                  updateAccessStatus()
                  updateCaptureStatus()
              }

              private fun loadSettings() {
                  seekOffset.progress = 160
                  updateOffsetText(160)
                  etScanInterval.setText(prefs.getInt("scan_interval_ms", 1200).toString())
                  swAntiBan.isChecked = prefs.getBoolean("anti_ban_mode", true)
                  
                  if (prefs.getString("click_mode", "PRIORITY") == "PRIORITY") 
                      rbPriority.isChecked = true 
                  else 
                      rbAll.isChecked = true
                  
                  val jsonStr = prefs.getString("item_list", "")
                  itemList.clear()
                  
                  if (jsonStr.isNullOrEmpty()) {
                      itemList.add(ItemConfig("Clamp", true, -40, 0))
                      itemList.add(ItemConfig("Transfusion", true, -40, 1))
                      itemList.add(ItemConfig("Scalpel", true, -40, 2))
                      itemList.add(ItemConfig("Stitches", true, -40, 3))
                      itemList.add(ItemConfig("Ultrasound", true, -40, 4))
                      itemList.add(ItemConfig("Anesthetic", true, -40, 5))
                      itemList.add(ItemConfig("Defibrillator", true, -40, 6))
                      itemList.add(ItemConfig("Splint", true, -40, 7))
                      itemList.add(ItemConfig("Pin", true, -40, 8))
                      saveSettings()
                  } else {
                      try {
                          val arr = JSONArray(jsonStr)
                          for (i in 0 until arr.length()) {
                              val o = arr.getJSONObject(i)
                              itemList.add(ItemConfig(
                                  itemName = o.getString("itemName"),
                                  enabled = o.optBoolean("enabled", true),
                                  offsetY = o.optInt("offsetY", -40),
                                  priority = o.optInt("priority", i),
                                  randomDelay = o.optBoolean("randomDelay", true)
                              ))
                          }
                      } catch (e: Exception) {
                          itemList.add(ItemConfig("Clamp", true, -40, 0))
                      }
                  }
              }

              private fun updateOffsetText(progress: Int) {
                  val offset = progress - 200
                  val text = when {
                      offset < 0 -> "Click ABOVE text " + kotlin.math.abs(offset) + "px"
                      offset > 0 -> "Click BELOW text " + offset + "px"
                      else -> "Click ON text (0px)"
                  }
                  tvOffset.text = text
              }

              private fun saveSettings() {
                  val arr = JSONArray()
                  for ((i, w) in itemList.withIndex()) {
                      val o = JSONObject()
                      o.put("itemName", w.itemName)
                      o.put("enabled", w.enabled)
                      o.put("offsetY", w.offsetY)
                      o.put("priority", i)
                      o.put("randomDelay", w.randomDelay)
                      arr.put(o)
                  }
                  prefs.edit()
                      .putInt("scan_interval_ms", etScanInterval.text.toString().toIntOrNull() ?: 1200)
                      .putString("item_list", arr.toString())
                      .putString("click_mode", if (rbPriority.isChecked) "PRIORITY" else "CLICK_ALL")
                      .putBoolean("anti_ban_mode", swAntiBan.isChecked)
                      .apply()
                  sendBroadcast(Intent("com.wordclicker.UPDATE_CONFIG"))
              }

              private fun setupRecyclerView() {
                  adapter = ItemListAdapter(itemList,
                      { pos -> itemList.removeAt(pos); adapter.notifyItemRemoved(pos); saveSettings() },
                      { saveSettings() }
                  )
                  rv.layoutManager = LinearLayoutManager(this)
                  rv.adapter = adapter
              }

              private fun setupListeners() {
                  btnAccess.setOnClickListener {
                      startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
                      Toast.makeText(this, "Find 'Growtopia AutoClicker' and enable it", Toast.LENGTH_LONG).show()
                  }

                  btnCapture.setOnClickListener {
                      if (ScreenCaptureService.isRunning) {
                          startService(Intent(this, ScreenCaptureService::class.java).apply { 
                              action = ScreenCaptureService.ACTION_STOP 
                          })
                          Handler(Looper.getMainLooper()).postDelayed({ updateCaptureStatus() }, 500)
                      } else {
                          if (!isAccessibilityEnabled()) {
                              Toast.makeText(this, "Enable Accessibility Service first!", Toast.LENGTH_LONG).show()
                              return@setOnClickListener
                          }
                          val mpm = getSystemService(MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                          capturePermissionLauncher.launch(mpm.createScreenCaptureIntent())
                      }
                  }

                  btnAdd.setOnClickListener {
                      val name = etItem.text.toString().trim().replace(" ", "_")
                      if (name.isEmpty()) { 
                          etItem.error = "Enter item name"
                          return@setOnClickListener 
                      }
                      if (itemList.any { it.itemName.equals(name, true) }) { 
                          Toast.makeText(this, "Item already exists!", Toast.LENGTH_SHORT).show()
                          return@setOnClickListener 
                      }
                      val offset = seekOffset.progress - 200
                      itemList.add(ItemConfig(name, true, offset, itemList.size))
                      adapter.notifyItemInserted(itemList.size - 1)
                      etItem.setText("")
                      saveSettings()
                  }

                  seekOffset.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
                      override fun onProgressChanged(s: SeekBar?, v: Int, u: Boolean) { 
                          updateOffsetText(v)
                      }
                      override fun onStartTrackingTouch(s: SeekBar?) {}
                      override fun onStopTrackingTouch(s: SeekBar?) {}
                  })
                  
                  rgMode.setOnCheckedChangeListener { _, _ -> saveSettings() }
                  swAntiBan.setOnCheckedChangeListener { _, _ -> saveSettings() }
                  
                  etScanInterval.addTextChangedListener(object : TextWatcher {
                      override fun afterTextChanged(s: Editable?) { saveSettings() }
                      override fun beforeTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
                      override fun onTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
                  })
                  
                  btnClear.setOnClickListener { tvLog.text = "" }
              }

              private fun isAccessibilityEnabled(): Boolean {
                  val am = getSystemService(ACCESSIBILITY_SERVICE) as AccessibilityManager
                  val services = am.getEnabledAccessibilityServiceList(AccessibilityServiceInfo.FEEDBACK_ALL_MASK)
                  val found = services.any { it.id.contains("wordclicker", true) || it.id.contains("growtopia", true) }
                  return found
              }

              private fun updateAccessStatus() {
                  val on = isAccessibilityEnabled()
                  indicatorAccess.backgroundTintList = ContextCompat.getColorStateList(this, 
                      if (on) android.R.color.holo_green_light else android.R.color.holo_red_light)
                  tvAccessStatus.text = if (on) "Active" else "Inactive"
                  tvAccessStatus.setTextColor(ContextCompat.getColor(this, 
                      if (on) android.R.color.holo_green_dark else android.R.color.holo_red_dark))
                  btnAccess.text = if (on) "Manage" else "Enable"
              }

              private fun updateCaptureStatus() {
                  val on = ScreenCaptureService.isRunning
                  indicatorCapture.backgroundTintList = ContextCompat.getColorStateList(this, 
                      if (on) android.R.color.holo_green_light else android.R.color.holo_red_light)
                  tvCaptureStatus.text = if (on) "Running" else "Stopped"
                  tvCaptureStatus.setTextColor(ContextCompat.getColor(this, 
                      if (on) android.R.color.holo_green_dark else android.R.color.holo_red_dark))
                  btnCapture.text = if (on) "Stop" else "Start Scan"
                  btnCapture.backgroundTintList = ContextCompat.getColorStateList(this, 
                      if (on) android.R.color.holo_red_light else android.R.color.holo_green_light)
              }
          }
