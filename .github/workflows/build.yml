          files["app/src/main/java/com/wordclicker/MainActivity.kt"] = """
package com.wordclicker

import android.accessibilityservice.AccessibilityServiceInfo
import android.app.Activity
import android.content.*
import android.media.projection.MediaProjectionManager
import android.os.*
import android.provider.Settings
import android.text.*
import android.view.accessibility.AccessibilityManager
import android.widget.*
import androidx.activity.result.contract.ActivityResultContracts
import androidx.appcompat.app.AppCompatActivity
import androidx.core.content.ContextCompat
import androidx.recyclerview.widget.LinearLayoutManager
import androidx.recyclerview.widget.RecyclerView
import org.json.JSONArray

class MainActivity : AppCompatActivity() {

    private lateinit var prefs: SharedPreferences
    private lateinit var adapter: WordListAdapter
    private val wordList = mutableListOf<WordConfig>()

    private lateinit var btnAccess: Button
    private lateinit var btnCapture: Button
    private lateinit var indicatorAccess: android.view.View
    private lateinit var indicatorCapture: android.view.View
    private lateinit var tvAccessStatus: TextView
    private lateinit var tvCaptureStatus: TextView
    private lateinit var etWord: EditText
    private lateinit var seekAbove: SeekBar
    private lateinit var tvAbove: TextView
    private lateinit var seekOnWord: SeekBar
    private lateinit var tvOnWord: TextView
    private lateinit var swAbove: Switch
    private lateinit var swOnWord: Switch
    private lateinit var rv: RecyclerView
    private lateinit var btnAdd: Button
    private lateinit var etDelay: EditText
    private lateinit var etScanInterval: EditText
    private lateinit var tvLog: TextView
    private lateinit var btnClear: Button
    private lateinit var rgMode: RadioGroup
    private lateinit var rbPriority: RadioButton
    private lateinit var rbAll: RadioButton

    private val capturePermissionLauncher =
        registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
            if (result.resultCode == Activity.RESULT_OK && result.data != null) {
                val intent = Intent(this, ScreenCaptureService::class.java).apply {
                    action = ScreenCaptureService.ACTION_START
                    putExtra(ScreenCaptureService.EXTRA_RESULT_CODE, result.resultCode)
                    putExtra(ScreenCaptureService.EXTRA_RESULT_DATA, result.data)
                }
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)
                    startForegroundService(intent)
                else
                    startService(intent)
            } else {
                Toast.makeText(this, "Izin screen capture ditolak", Toast.LENGTH_SHORT).show()
            }
        }

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_main)
        prefs = getSharedPreferences("WordClickerPrefs", Context.MODE_PRIVATE)

        btnAccess       = findViewById(R.id.btnToggleAccess)
        btnCapture      = findViewById(R.id.btnToggleCapture)
        indicatorAccess = findViewById(R.id.indicatorAccess)
        indicatorCapture= findViewById(R.id.indicatorCapture)
        tvAccessStatus  = findViewById(R.id.tvAccessStatus)
        tvCaptureStatus = findViewById(R.id.tvCaptureStatus)
        etWord          = findViewById(R.id.etNewWord)
        seekAbove       = findViewById(R.id.seekOffsetAbove)
        tvAbove         = findViewById(R.id.tvOffsetAbove)
        seekOnWord      = findViewById(R.id.seekOffsetOnWord)
        tvOnWord        = findViewById(R.id.tvOffsetOnWord)
        swAbove         = findViewById(R.id.switchClickAbove)
        swOnWord        = findViewById(R.id.switchClickOnWord)
        rv              = findViewById(R.id.rvWordList)
        btnAdd          = findViewById(R.id.btnAddWord)
        etDelay         = findViewById(R.id.etDelayMs)
        etScanInterval  = findViewById(R.id.etScanInterval)
        tvLog           = findViewById(R.id.tvLog)
        btnClear        = findViewById(R.id.btnClearLog)
        rgMode          = findViewById(R.id.rgClickMode)
        rbPriority      = findViewById(R.id.rbPriority)
        rbAll           = findViewById(R.id.rbClickAll)

        loadSettings()
        setupRecyclerView()
        setupListeners()

        ScreenCaptureService.logCallback = { msg ->
            runOnUiThread {
                val lines = tvLog.text.toString().split("\\n").takeLast(60)
                tvLog.text = (lines + msg).joinToString("\\n")
            }
        }
    }

    override fun onResume() {
        super.onResume()
        updateAccessStatus()
        updateCaptureStatus()
    }

    private fun loadSettings() {
        seekAbove.progress = prefs.getInt("offset_above", 80)
        tvAbove.text = "Offset Atas: \${seekAbove.progress}px"
        seekOnWord.progress = prefs.getInt("offset_on_word", 0)
        tvOnWord.text = "Offset Kata: \${seekOnWord.progress}px"
        swAbove.isChecked   = prefs.getBoolean("click_above", true)
        swOnWord.isChecked  = prefs.getBoolean("click_on_word", false)
        etDelay.setText(prefs.getInt("delay_ms", 800).toString())
        etScanInterval.setText(prefs.getInt("scan_interval_ms", 1000).toString())
        if (prefs.getString("click_mode", "PRIORITY") == "PRIORITY") rbPriority.isChecked = true else rbAll.isChecked = true
        val arr = JSONArray(prefs.getString("word_list", "[]") ?: "[]")
        wordList.clear()
        for (i in 0 until arr.length()) {
            val o = arr.getJSONObject(i)
            wordList.add(WordConfig(o.getString("word"), o.getBoolean("enabled"), o.optBoolean("clickAbove", true), o.optBoolean("clickOnWord", false), o.optInt("offsetAbove", 80)))
        }
    }

    private fun saveSettings() {
        val arr = JSONArray()
        for (w in wordList) {
            val o = org.json.JSONObject()
            o.put("word", w.word); o.put("enabled", w.enabled)
            o.put("clickAbove", w.clickAbove); o.put("clickOnWord", w.clickOnWord)
            o.put("offsetAbove", w.offsetAbove); arr.put(o)
        }
        prefs.edit()
            .putInt("offset_above", seekAbove.progress)
            .putInt("offset_on_word", seekOnWord.progress)
            .putBoolean("click_above", swAbove.isChecked)
            .putBoolean("click_on_word", swOnWord.isChecked)
            .putInt("delay_ms", etDelay.text.toString().toIntOrNull() ?: 800)
            .putInt("scan_interval_ms", etScanInterval.text.toString().toIntOrNull() ?: 1000)
            .putString("word_list", arr.toString())
            .putString("click_mode", if (rbPriority.isChecked) "PRIORITY" else "CLICK_ALL")
            .apply()
        sendBroadcast(Intent("com.wordclicker.UPDATE_CONFIG"))
    }

    private fun setupRecyclerView() {
        adapter = WordListAdapter(wordList,
            { pos -> wordList.removeAt(pos); adapter.notifyItemRemoved(pos); saveSettings() },
            { saveSettings() }
        )
        rv.layoutManager = LinearLayoutManager(this)
        rv.adapter = adapter
    }

    private fun setupListeners() {
        btnAccess.setOnClickListener {
            startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
            Toast.makeText(this, "Cari 'Word Auto Clicker' lalu aktifkan", Toast.LENGTH_LONG).show()
        }

        btnCapture.setOnClickListener {
            if (ScreenCaptureService.isRunning) {
                startService(Intent(this, ScreenCaptureService::class.java).apply { action = ScreenCaptureService.ACTION_STOP })
                Handler(Looper.getMainLooper()).postDelayed({ updateCaptureStatus() }, 500)
            } else {
                if (!isAccessibilityEnabled()) {
                    Toast.makeText(this, "Aktifkan Accessibility Service dulu!", Toast.LENGTH_LONG).show()
                    return@setOnClickListener
                }
                val mpm = getSystemService(MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                capturePermissionLauncher.launch(mpm.createScreenCaptureIntent())
            }
        }

        btnAdd.setOnClickListener {
            val w = etWord.text.toString().trim()
            if (w.isEmpty()) { etWord.error = "Masukkan kata"; return@setOnClickListener }
            if (wordList.any { it.word.equals(w, true) }) { Toast.makeText(this, "Sudah ada!", Toast.LENGTH_SHORT).show(); return@setOnClickListener }
            wordList.add(WordConfig(w, true, swAbove.isChecked, swOnWord.isChecked, seekAbove.progress))
            adapter.notifyItemInserted(wordList.size - 1)
            etWord.setText(""); saveSettings()
        }

        seekAbove.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
            override fun onProgressChanged(s: SeekBar?, v: Int, u: Boolean) { tvAbove.text = "Offset Atas: \${v}px" }
            override fun onStartTrackingTouch(s: SeekBar?) {}
            override fun onStopTrackingTouch(s: SeekBar?) { saveSettings() }
        })
        seekOnWord.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
            override fun onProgressChanged(s: SeekBar?, v: Int, u: Boolean) { tvOnWord.text = "Offset Kata: \${v}px" }
            override fun onStartTrackingTouch(s: SeekBar?) {}
            override fun onStopTrackingTouch(s: SeekBar?) { saveSettings() }
        })
        swAbove.setOnCheckedChangeListener  { _, _ -> saveSettings() }
        swOnWord.setOnCheckedChangeListener { _, _ -> saveSettings() }
        rgMode.setOnCheckedChangeListener   { _, _ -> saveSettings() }
        etDelay.addTextChangedListener(object : TextWatcher {
            override fun afterTextChanged(s: Editable?) { saveSettings() }
            override fun beforeTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
            override fun onTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
        })
        etScanInterval.addTextChangedListener(object : TextWatcher {
            override fun afterTextChanged(s: Editable?) { saveSettings() }
            override fun beforeTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
            override fun onTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
        })
        btnClear.setOnClickListener { tvLog.text = "" }
    }

    private fun isAccessibilityEnabled(): Boolean {
        val am = getSystemService(ACCESSIBILITY_SERVICE) as AccessibilityManager
        return am.getEnabledAccessibilityServiceList(AccessibilityServiceInfo.FEEDBACK_ALL_MASK)
            .any { it.id.contains("wordclicker", true) }
    }

    private fun updateAccessStatus() {
        val on = isAccessibilityEnabled()
        indicatorAccess.backgroundTintList = ContextCompat.getColorStateList(this, if (on) android.R.color.holo_green_light else android.R.color.holo_red_light)
        tvAccessStatus.text = if (on) "Aktif" else "Tidak Aktif"
        tvAccessStatus.setTextColor(ContextCompat.getColor(this, if (on) android.R.color.holo_green_dark else android.R.color.holo_red_dark))
        btnAccess.text = if (on) "Kelola" else "Aktifkan"
    }

    private fun updateCaptureStatus() {
        val on = ScreenCaptureService.isRunning
        indicatorCapture.backgroundTintList = ContextCompat.getColorStateList(this, if (on) android.R.color.holo_green_light else android.R.color.holo_red_light)
        tvCaptureStatus.text = if (on) "Berjalan" else "Berhenti"
        tvCaptureStatus.setTextColor(ContextCompat.getColor(this, if (on) android.R.color.holo_green_dark else android.R.color.holo_red_dark))
        btnCapture.text = if (on) "Stop" else "Mulai Scan"
        btnCapture.backgroundTintList = ContextCompat.getColorStateList(this, if (on) android.R.color.holo_red_light else android.R.color.holo_green_light)
    }
}
