          files["app/src/main/java/com/wordclicker/WordListAdapter.kt"] = r"""package com.wordclicker

          import android.view.LayoutInflater
          import android.view.View
          import android.view.ViewGroup
          import android.widget.Button
          import android.widget.SeekBar
          import android.widget.Switch
          import android.widget.TextView
          import androidx.recyclerview.widget.RecyclerView

          class WordListAdapter(
              private val items: MutableList<WordConfig>,
              private val onDelete: (Int) -> Unit,
              private val onChange: () -> Unit
          ) : RecyclerView.Adapter<WordListAdapter.VH>() {

              inner class VH(v: View) : RecyclerView.ViewHolder(v) {
                  val tvPriority: TextView = v.findViewById(R.id.tvPriority)
                  val tvWord: TextView = v.findViewById(R.id.tvWord)
                  val swEnabled: Switch = v.findViewById(R.id.switchEnabled)
                  val swAbove: Switch = v.findViewById(R.id.switchItemClickAbove)
                  val swOnWord: Switch = v.findViewById(R.id.switchItemClickOnWord)
                  val seekOff: SeekBar = v.findViewById(R.id.seekItemOffset)
                  val tvOff: TextView = v.findViewById(R.id.tvItemOffset)
                  val btnDel: Button = v.findViewById(R.id.btnDeleteWord)
                  val btnUp: Button = v.findViewById(R.id.btnMoveUp)
                  val btnDn: Button = v.findViewById(R.id.btnMoveDown)
              }

              override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): VH {
                  val v = LayoutInflater.from(parent.context).inflate(R.layout.item_word, parent, false)
                  return VH(v)
              }

              override fun getItemCount() = items.size

              override fun onBindViewHolder(h: VH, position: Int) {
                  val item = items[position]
                  h.tvPriority.text = "#${position + 1}"
                  h.tvWord.text = item.word
                  h.swEnabled.isChecked = item.enabled
                  h.swAbove.isChecked = item.clickAbove
                  h.swOnWord.isChecked = item.clickOnWord
                  h.seekOff.progress = item.offsetAbove
                  h.tvOff.text = "Offset atas: ${item.offsetAbove}px"
                  h.btnUp.alpha = if (position == 0) 0.3f else 1f
                  h.btnDn.alpha = if (position == items.size - 1) 0.3f else 1f
                  h.swEnabled.setOnCheckedChangeListener { _, c -> items[h.adapterPosition] = items[h.adapterPosition].copy(enabled = c); onChange() }
                  h.swAbove.setOnCheckedChangeListener { _, c -> items[h.adapterPosition] = items[h.adapterPosition].copy(clickAbove = c); onChange() }
                  h.swOnWord.setOnCheckedChangeListener { _, c -> items[h.adapterPosition] = items[h.adapterPosition].copy(clickOnWord = c); onChange() }
                  h.seekOff.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
                      override fun onProgressChanged(s: SeekBar?, v: Int, u: Boolean) {
                          h.tvOff.text = "Offset atas: ${v}px"
                          if (u) items[h.adapterPosition] = items[h.adapterPosition].copy(offsetAbove = v)
                      }
                      override fun onStartTrackingTouch(s: SeekBar?) {}
                      override fun onStopTrackingTouch(s: SeekBar?) { onChange() }
                  })
                  h.btnDel.setOnClickListener { val p = h.adapterPosition; if (p >= 0) onDelete(p) }
                  h.btnUp.setOnClickListener {
                      val p = h.adapterPosition
                      if (p > 0) { val t = items[p-1]; items[p-1] = items[p]; items[p] = t; notifyItemMoved(p, p-1); notifyItemChanged(p-1); notifyItemChanged(p); onChange() }
                  }
                  h.btnDn.setOnClickListener {
                      val p = h.adapterPosition
                      if (p < items.size - 1) { val t = items[p+1]; items[p+1] = items[p]; items[p] = t; notifyItemMoved(p, p+1); notifyItemChanged(p); notifyItemChanged(p+1); onChange() }
                  }
              }
          }
          """

          files["app/src/main/java/com/wordclicker/MainActivity.kt"] = r"""package com.wordclicker

          import android.accessibilityservice.AccessibilityServiceInfo
          import android.content.Context
          import android.content.Intent
          import android.content.SharedPreferences
          import android.os.Bundle
          import android.provider.Settings
          import android.text.Editable
          import android.text.TextWatcher
          import android.view.accessibility.AccessibilityManager
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import org.json.JSONArray

          class MainActivity : AppCompatActivity() {

              private lateinit var prefs: SharedPreferences
              private lateinit var adapter: WordListAdapter
              private val wordList = mutableListOf<WordConfig>()
              private lateinit var btnToggle: Button
              private lateinit var indicator: android.view.View
              private lateinit var tvStatus: TextView
              private lateinit var etWord: EditText
              private lateinit var seekAbove: SeekBar
              private lateinit var tvAbove: TextView
              private lateinit var seekOnWord: SeekBar
              private lateinit var tvOnWord: TextView
              private lateinit var swAbove: Switch
              private lateinit var swOnWord: Switch
              private lateinit var rv: RecyclerView
              private lateinit var btnAdd: Button
              private lateinit var etDelay: EditText
              private lateinit var swLoop: Switch
              private lateinit var tvLog: TextView
              private lateinit var btnClear: Button
              private lateinit var rgMode: RadioGroup
              private lateinit var rbPriority: RadioButton
              private lateinit var rbAll: RadioButton

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  prefs = getSharedPreferences("WordClickerPrefs", Context.MODE_PRIVATE)
                  btnToggle = findViewById(R.id.btnToggleService)
                  indicator = findViewById(R.id.statusIndicator)
                  tvStatus = findViewById(R.id.tvStatus)
                  etWord = findViewById(R.id.etNewWord)
                  seekAbove = findViewById(R.id.seekOffsetAbove)
                  tvAbove = findViewById(R.id.tvOffsetAbove)
                  seekOnWord = findViewById(R.id.seekOffsetOnWord)
                  tvOnWord = findViewById(R.id.tvOffsetOnWord)
                  swAbove = findViewById(R.id.switchClickAbove)
                  swOnWord = findViewById(R.id.switchClickOnWord)
                  rv = findViewById(R.id.rvWordList)
                  btnAdd = findViewById(R.id.btnAddWord)
                  etDelay = findViewById(R.id.etDelayMs)
                  swLoop = findViewById(R.id.switchLoop)
                  tvLog = findViewById(R.id.tvLog)
                  btnClear = findViewById(R.id.btnClearLog)
                  rgMode = findViewById(R.id.rgClickMode)
                  rbPriority = findViewById(R.id.rbPriority)
                  rbAll = findViewById(R.id.rbClickAll)
                  loadSettings(); setupRecyclerView(); setupListeners()
              }

              override fun onResume() { super.onResume(); updateStatus() }

              private fun loadSettings() {
                  seekAbove.progress = prefs.getInt("offset_above", 80)
                  tvAbove.text = "Offset Atas: ${seekAbove.progress}px"
                  seekOnWord.progress = prefs.getInt("offset_on_word", 0)
                  tvOnWord.text = "Offset Kata: ${seekOnWord.progress}px"
                  swAbove.isChecked = prefs.getBoolean("click_above", true)
                  swOnWord.isChecked = prefs.getBoolean("click_on_word", false)
                  etDelay.setText(prefs.getInt("delay_ms", 500).toString())
                  swLoop.isChecked = prefs.getBoolean("loop_enabled", true)
                  if (prefs.getString("click_mode", "PRIORITY") == "PRIORITY") rbPriority.isChecked = true else rbAll.isChecked = true
                  val arr = JSONArray(prefs.getString("word_list", "[]") ?: "[]")
                  wordList.clear()
                  for (i in 0 until arr.length()) {
                      val o = arr.getJSONObject(i)
                      wordList.add(WordConfig(o.getString("word"), o.getBoolean("enabled"), o.optBoolean("clickAbove", true), o.optBoolean("clickOnWord", false), o.optInt("offsetAbove", 80)))
                  }
              }

              private fun saveSettings() {
                  val arr = JSONArray()
                  for (w in wordList) {
                      val o = org.json.JSONObject()
                      o.put("word", w.word); o.put("enabled", w.enabled)
                      o.put("clickAbove", w.clickAbove); o.put("clickOnWord", w.clickOnWord)
                      o.put("offsetAbove", w.offsetAbove); arr.put(o)
                  }
                  prefs.edit()
                      .putInt("offset_above", seekAbove.progress)
                      .putInt("offset_on_word", seekOnWord.progress)
                      .putBoolean("click_above", swAbove.isChecked)
                      .putBoolean("click_on_word", swOnWord.isChecked)
                      .putInt("delay_ms", etDelay.text.toString().toIntOrNull() ?: 500)
                      .putBoolean("loop_enabled", swLoop.isChecked)
                      .putString("word_list", arr.toString())
                      .putString("click_mode", if (rbPriority.isChecked) "PRIORITY" else "CLICK_ALL")
                      .apply()
                  sendBroadcast(Intent("com.wordclicker.UPDATE_CONFIG"))
              }

              private fun setupRecyclerView() {
                  adapter = WordListAdapter(wordList, { pos -> wordList.removeAt(pos); adapter.notifyItemRemoved(pos); saveSettings() }, { saveSettings() })
                  rv.layoutManager = LinearLayoutManager(this); rv.adapter = adapter
              }

              private fun setupListeners() {
                  btnToggle.setOnClickListener { startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS)); Toast.makeText(this, "Cari 'Word Auto Clicker' lalu aktifkan", Toast.LENGTH_LONG).show() }
                  btnAdd.setOnClickListener {
                      val w = etWord.text.toString().trim()
                      if (w.isEmpty()) { etWord.error = "Masukkan kata"; return@setOnClickListener }
                      if (wordList.any { it.word.equals(w, true) }) { Toast.makeText(this, "Sudah ada!", Toast.LENGTH_SHORT).show(); return@setOnClickListener }
                      wordList.add(WordConfig(w, true, swAbove.isChecked, swOnWord.isChecked, seekAbove.progress))
                      adapter.notifyItemInserted(wordList.size - 1); etWord.setText(""); saveSettings()
                  }
                  seekAbove.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
                      override fun onProgressChanged(s: SeekBar?, v: Int, u: Boolean) { tvAbove.text = "Offset Atas: ${v}px" }
                      override fun onStartTrackingTouch(s: SeekBar?) {}
                      override fun onStopTrackingTouch(s: SeekBar?) { saveSettings() }
                  })
                  seekOnWord.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
                      override fun onProgressChanged(s: SeekBar?, v: Int, u: Boolean) { tvOnWord.text = "Offset Kata: ${v}px" }
                      override fun onStartTrackingTouch(s: SeekBar?) {}
                      override fun onStopTrackingTouch(s: SeekBar?) { saveSettings() }
                  })
                  swAbove.setOnCheckedChangeListener { _, _ -> saveSettings() }
                  swOnWord.setOnCheckedChangeListener { _, _ -> saveSettings() }
                  swLoop.setOnCheckedChangeListener { _, _ -> saveSettings() }
                  rgMode.setOnCheckedChangeListener { _, _ -> saveSettings() }
                  etDelay.addTextChangedListener(object : TextWatcher {
                      override fun afterTextChanged(s: Editable?) { saveSettings() }
                      override fun beforeTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
                      override fun onTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
                  })
                  btnClear.setOnClickListener { tvLog.text = "" }
                  WordClickerAccessibilityService.logCallback = { msg ->
                      runOnUiThread { val lines = tvLog.text.toString().split("\n").takeLast(50); tvLog.text = (lines + msg).joinToString("\n") }
                  }
              }

              private fun updateStatus() {
                  val am = getSystemService(ACCESSIBILITY_SERVICE) as AccessibilityManager
                  val on = am.getEnabledAccessibilityServiceList(AccessibilityServiceInfo.FEEDBACK_ALL_MASK).any { it.id.contains("wordclicker", true) }
                  indicator.backgroundTintList = ContextCompat.getColorStateList(this, if (on) android.R.color.holo_green_light else android.R.color.holo_red_light)
                  tvStatus.text = if (on) "Aktif" else "Tidak Aktif"
                  tvStatus.setTextColor(ContextCompat.getColor(this, if (on) android.R.color.holo_green_dark else android.R.color.holo_red_dark))
                  btnToggle.text = if (on) "Kelola Service" else "Aktifkan Service"
              }
          }
          """

